services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: horizon-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    volumes:
      - ./data:/app/data

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: horizon-test
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.test
    volumes:
      - ./data:/app/data

  acceptance:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: horizon-acceptance
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env.acceptance
    volumes:
      - ./data:/app/data

networks:
  default:
    driver: bridge